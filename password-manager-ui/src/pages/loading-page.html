<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка</title>
    <link rel="stylesheet" href="../styles/loading.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Подключение к серверу...</div>
    <div class="error-container" id="errorContainer" style="display: none;">
        <span id="errorMessage"></span>
    </div>
</div>

<div id="master-password-modal" class="modal" style="display: none;">
    <div class="modal-content auth-modal-card">
        <div class="auth-modal-badge">PM</div>
        <h2 class="auth-modal-title">Введите мастер-пароль</h2>
        <p id="modal-error-message" class="auth-modal-text">Пожалуйста, введите мастер-пароль.</p>
        <input type="password" id="master-password-input" class="auth-modal-input" placeholder="Мастер-пароль">
        <button class="retry-btn auth-modal-primary" onclick="retryMasterPassword()">Продолжить</button>
        <button class="logout-btn auth-modal-secondary" onclick="logout()">Выйти</button>
    </div>
</div>

<script type="module" src="../scripts/loading.ts"></script>
</body>
</html>
